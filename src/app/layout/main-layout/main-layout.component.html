<mat-sidenav-container class="sidenav-container">
  
  <mat-sidenav #sidenav mode="side" opened class="app-sidenav mat-elevation-z4">
    <div class="sidenav-header">
      <img src="assets/img/drtc-logo.png" alt="Logo" class="sidenav-logo" onerror="this.src='https://via.placeholder.com/150x60?text=DRTC'">
      <div class="brand-text">
        <h2>Expedientes</h2>
        <span>Licencias SNC</span>
      </div>
    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      
      <a mat-list-item routerLink="/expedientes/registro" routerLinkActive="active-link">
        <mat-icon matListItemIcon>add_circle</mat-icon>
        <span matListItemTitle>Registrar Expediente</span>
      </a>

      <a mat-list-item routerLink="/reportes/diario" routerLinkActive="active-link">
        <mat-icon matListItemIcon>summarize</mat-icon>
        <span matListItemTitle>Reporte Diario</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-content-wrapper">
    <mat-toolbar color="primary" class="app-header mat-elevation-z2">
      <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle sidenav">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="spacer"></span>

      <!-- User context info -->
      @if (authService.currentUser(); as user) {
        <div class="user-context">
          <mat-icon>person</mat-icon>
          <span class="operator-name">{{ user?.['nombre'] || 'Operador' }}</span>
        </div>
      }

      <button mat-icon-button (click)="onLogout()" matTooltip="Cerrar sesión">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <!-- Main Content Area -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>

</mat-sidenav-container>
