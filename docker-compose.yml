version: '3.8'

services:
  # ── SERVICIO DEL FRONTAL (ANGULAR + NGINX) ──
  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    container_name: drtc_frontend
    restart: unless-stopped
    ports:
      # Nnginx Proxy Manager usa el 80, usamos el 8088 como puerto interno
      - "8088:80"
    depends_on:
      - pocketbase

  # ── SERVICIO DEL BACKEND (POCKETBASE) ──
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: drtc_pocketbase
    restart: unless-stopped
    ports:
      # Nnginx Proxy Manager usa el 8090 apuntando al host 81, usamos 8095
      - "8095:8090"
    volumes:
      - ./pb_data:/pb_data
      - ./pocketbase/pb_migrations:/pb_migrations
    command: ["--dir", "/pb_data"]
